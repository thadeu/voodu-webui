# solid_queue recurring task definitions. Rails 8 picks this up via
# the supervisor (bin/jobs or SOLID_QUEUE_IN_PUMA) and schedules each
# entry at the configured cadence.
#
# Note: tasks scheduled here ONLY fire when the supervisor is
# actually running. In dev, that means `bin/dev` includes a `jobs:`
# Procfile entry OR the operator sets `SOLID_QUEUE_IN_PUMA=true`
# before booting Puma. With neither, the WebUI works fine but the
# warehouse never refills.
#
# solid_queue reads the env-matching section (Rails.env). The
# `common` anchor at the top lets us share entries across dev/prod
# without copy-paste — production adds the housekeeping job on top.
# Test env is intentionally absent so the spec suite doesn't fight
# with a background ticker.

common: &common
  metrics_sync:
    class: MetricsSyncOrchestratorJob
    # 14s sync paired with MetricsData.CACHE_TTL=10s — the 4s gap
    # guarantees that whatever cache window was warmed at sync T
    # has expired by sync T+1, so each broadcast-triggered
    # frame.reload() always cache-misses and pulls fresh data.
    # Sits just under the 15s controller-side sampler cadence
    # so we don't accidentally lap it. Cheap NDJSON-tail-and-
    # bulk-insert; cadence cost is nothing on local SQLite.
    schedule: every 14 seconds

  state_sync:
    class: StateSyncOrchestratorJob
    # 30s cadence — was 10s, raised because every tick invokes
    # `docker stats --no-stream` IN BATCH for all containers on
    # the island (via /pods?detail=true → StatsCollector). That
    # call is the single biggest CPU/IO consumer the controller
    # has: docker stats samples cgroup files TWICE per container
    # to compute CPU%, so a 10-pod batch takes ~1-2s of dockerd
    # CPU every tick.
    #
    # 30s still falls inside IslandHealth.OFFLINE_THRESHOLD (120s)
    # so a missed tick doesn't flip the status pill. Trade-off:
    # sidebar/topbar status updates feel ~20s slower under that
    # threshold; for the cost cut on the controller (3× less
    # docker stats churn) it's a clear win.
    #
    # Independent of metrics-sync (different data path, different
    # transactionality, and metrics-sync does NOT shell out to
    # docker stats — it pulls pre-sampled NDJSON from /metrics/dump).
    schedule: every 30 seconds

  log_tail_orchestrator:
    class: LogTailOrchestratorJob
    # 1 min cadence — fast enough to recover from a crashed tail job
    # in under a minute, slow enough that the per-island TailLock
    # check overhead is negligible. Per-island work is dropped at
    # this tick if a tail is already in flight (TailLock guard).
    schedule: every 1 minute

  log_tail_cleanup:
    class: LogTailCleanupJob
    # 03:00 daily — low-traffic window. Reaps NDJSON files older
    # than RETENTION_DAYS (2). Empty pod-dirs get removed too so
    # decommissioned pods don't leak the tree.
    schedule: every day at 3:00 am

  log_export_cleanup:
    class: LogExportCleanupJob
    # Hourly — reaps LogExport rows whose expires_at has passed
    # (24h post-ready by default) + orphan .partial files left
    # by crashed export jobs.
    schedule: every hour

development:
  <<: *common

production:
  <<: *common
  # solid_queue grows finished_jobs unbounded by default. The hourly
  # batched delete keeps the queue DB lean without spiking IO
  # (sleep_between_batches throttles).
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
