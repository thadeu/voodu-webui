default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    # Default worker pool — handles state_sync, metrics_sync,
    # log_export, recurring scaffolding. Multi-threaded for
    # throughput across the many short jobs.
    - queues: "default"
      threads: 3
      processes: <%= ENV.fetch("JOB_CONCURRENCY", 1) %>
      polling_interval: 0.1

    # Dedicated `:log_tail` pool for the long-running SSE consumer
    # (`LogTailServerJob`). Threads = 4 supports up to 4 servers
    # tailing concurrently without competing with the short-running
    # jobs on `:default`. Each tail job self-terminates after 1h
    # so the workers cycle naturally; the orchestrator re-spawns.
    - queues: "log_tail"
      threads: 4
      processes: 1
      polling_interval: 0.5

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
