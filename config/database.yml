# SQLite. Embedded in the image — no external DB to manage.
#
# Production database lives under storage/ so a Docker shared volume
# can mount that single path if/when the operator needs persistence
# across container restarts. Cache/queue/cable each get their own DB
# (Rails 8 multi-DB pattern, same as the PostgreSQL default — keeps
# write contention off the primary).

default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3

test:
  <<: *default
  database: storage/test.sqlite3

production:
  primary:
    <<: *default
    database: storage/production.sqlite3
  cache:
    <<: *default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/production_cable.sqlite3
    migrations_paths: db/cable_migrate
