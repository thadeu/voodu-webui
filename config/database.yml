# SQLite. Embedded in the image — no external DB to manage.
#
# Production database lives under storage/ so a Docker shared volume
# can mount that single path if/when the operator needs persistence
# across container restarts. Cache/queue/cable each get their own DB
# (Rails 8 multi-DB pattern, same as the PostgreSQL default — keeps
# write contention off the primary).

default: &default
  adapter: sqlite3
  # Pool must cover the sum of all concurrent DB users in the same
  # Ruby process: Puma worker threads (3 default) + every Solid Queue
  # worker thread + dispatcher pollers. Our queue.yml runs:
  #   - default pool: 3 threads
  #   - log_tail pool: 4 threads (long-running SSE tail jobs)
  #   - 1 dispatcher
  # → 8 minimum. We pad to 10 for headroom (next time someone adds a
  # worker pool, no Mystery Pool-Exhaustion error). Bumping the pool
  # is cheap on SQLite WAL — readers don't block each other, writers
  # serialise behind the file lock either way.
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 10 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  # solid_queue, solid_cache and solid_cable tables live in their own
  # SQLite files in dev — same shape as prod, so the recurring
  # supervisor (bin/jobs) finds `solid_queue_recurring_tasks` etc.
  # right where the gems expect. Each <name>_schema.rb is loaded into
  # the matching file on `db:prepare`.
  cache:
    <<: *default
    database: storage/development_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/development_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/development_cable.sqlite3
    migrations_paths: db/cable_migrate
  # Metrics warehouse. High-volume background-job writes (every 30s,
  # per-tenant) live in their own file to keep the primary lean.
  metrics:
    <<: *default
    database: storage/development_metrics.sqlite3
    migrations_paths: db/metrics_migrate
  # HEP3 SIP-capture read model. The Hep3 poller tails the reader's
  # /export NDJSON into here (one row per SIP message); call-flow +
  # DataTable read from it. Separate file for the same reason as
  # metrics — high-volume poller writes off the primary.
  hep:
    <<: *default
    database: storage/development_hep.sqlite3
    migrations_paths: db/hep_migrate

test:
  primary:
    <<: *default
    database: storage/test.sqlite3
  cache:
    <<: *default
    database: storage/test_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/test_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/test_cable.sqlite3
    migrations_paths: db/cable_migrate
  metrics:
    <<: *default
    database: storage/test_metrics.sqlite3
    migrations_paths: db/metrics_migrate
  hep:
    <<: *default
    database: storage/test_hep.sqlite3
    migrations_paths: db/hep_migrate

production:
  primary:
    <<: *default
    database: storage/production.sqlite3
  cache:
    <<: *default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/production_cable.sqlite3
    migrations_paths: db/cable_migrate
  metrics:
    <<: *default
    database: storage/production_metrics.sqlite3
    migrations_paths: db/metrics_migrate
  hep:
    <<: *default
    database: storage/production_hep.sqlite3
    migrations_paths: db/hep_migrate
