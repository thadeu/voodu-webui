# Standard Ruby is the source of truth for style in this project.
# This file only exists so RuboCop-based tooling (editors, bin/rubocop, CI)
# applies Standard's ruleset instead of stock RuboCop's many opinions. The
# canonical runner is `bundle exec standardrb`; `bin/rubocop` picks up the
# same rules through this inherit.
require:
  - standard
  - standard-custom
  - standard-performance

inherit_gem:
  standard: config/base.yml
  standard-custom: config/base.yml
  standard-performance: config/base.yml

AllCops:
  SuggestExtensions: false
  Exclude:
    - "bin/**/*"
    - "db/schema.rb"
    - "db/**/migrate/**/*"
    - "node_modules/**/*"
    - "tmp/**/*"
    - "vendor/**/*"
    - "gems/**/*"
    - "storage/**/*"

Layout/ArgumentAlignment:
  Enabled: false

Layout/SpaceInsideHashLiteralBraces:
  Enabled: false
  